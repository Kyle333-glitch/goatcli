name: goatcli-privacy

on:
  push:
    branches:
      - main
      - dev
      - feat/v0.3.2-privacy-telemetry
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: privacy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 24.16.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: npm

      - name: Record native platform
        run: node -p "process.platform + '-' + process.arch + ' node-' + process.versions.node"

      - name: Install locked dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Check privacy architecture
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run full tests
        run: npm test

      - name: Run privacy canary tests
        run: npm run test:privacy

      - name: Verify npm payload
        run: npm run verify:package

      - name: Show npm dry-run payload
        run: npm pack --dry-run --json --ignore-scripts
